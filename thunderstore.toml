[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "RedactedNotification"
description = "HUD alert when the rare ERROR REDACTED mission modifier appears on the mission board — even while you are mid-mission."
websiteUrl = "https://github.com/Little-Sparroh/RedactedNotification"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"
Sparroh-SparrohUILib = "1.1.1"

[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/net48/RedactedNotification.dll"
target = "BepInEx/plugins/RedactedNotification.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]
